        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, active, expired]
      responses:
        '200':
          description: Promotion status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  # ─────────────────────────────────────────────
  # Admin Dashboard
  # ─────────────────────────────────────────────
  /admin/dashboard:
    get:
      tags: [Admin Dashboard]
      summary: Get dashboard overview
      security:
        - AdminAuth: []
      responses:
        '200':
          description: Dashboard data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      users:
                        type: integer
                      shops:
                        type: integer
                      products:
                        type: integer
                      orders:
                        type: integer
                      payments:
                        type: integer
                      reviews:
                        type: integer
                      messages:
                        type: integer
                      revenue:
                        type: number

  /admin/dashboard/analytics:
    get:
      tags: [Admin Dashboard]
      summary: Get dashboard analytics
      security:
        - AdminAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      ordersByDate:
                        type: array
                        items:
                          type: object
                      topProducts:
                        type: array
                        items:
                          type: object
                      topShops:
                        type: array
                        items:
                          type: object
                      newUsersByDate:
                        type: array
                        items:
                          type: object
