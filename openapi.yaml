openapi: 3.0.3
info:
  title: Ruderalis API
  description: Medical marijuana ecommerce backend API
  version: 1.0.0
  contact:
    name: Ruderalis API Support

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

security: []

components:
  securitySchemes:
    UserAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated users (vendor or user role)
    VendorAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated vendors (role=vendor)
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated admins (admin or super-admin role)

  schemas:
    Address:
      type: object
      properties:
        country:
          type: string
        region:
          type: string
        city:
          type: string
        street:
          type: string
        gpAddressOrHouseNumber:
          type: string
        landmark:
          type: string

    User:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
          enum: [active, suspended, pending, deleted, frozen]
        role:
          type: string
          enum: [vendor, user]
        address:
          $ref: '#/components/schemas/Address'
        permissions:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Admin:
      type: object
      properties:
        _id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
          enum: [active, suspended, pending, deleted]
        role:
          type: string
          enum: [admin, super-admin]
        permissions:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Price:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          enum: [GHS, USD, EUR]

    Stock:
      type: object
      properties:
        available:
          type: boolean
        quantity:
          type: integer

    SaleInfo:
      type: object
      properties:
        status:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        price:
          $ref: '#/components/schemas/Price'

    FeaturedInfo:
      type: object
      properties:
        status:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    RatingDetails:
      type: object
      properties:
        five:
          type: integer
        four:
          type: integer
        three:
          type: integer
        two:
          type: integer
        one:
          type: integer

    Rating:
      type: object
      properties:
        average:
          type: number
        count:
          type: integer
        details:
          $ref: '#/components/schemas/RatingDetails'

    ProductMetadata:
      type: object
      properties:
        marijuana:
          type: object
        edible:
          type: object
        accessory:
          type: object

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        owner:
          type: string
          description: ObjectId reference to User
        shop:
          type: string
          description: ObjectId reference to Shop
        status:
          type: string
          enum: [active, deleted, pending]
        stock:
          $ref: '#/components/schemas/Stock'
        price:
          $ref: '#/components/schemas/Price'
        description:
          type: string
        image:
          type: string
        sale:
          $ref: '#/components/schemas/SaleInfo'
        rank:
          type: integer
        featured:
          $ref: '#/components/schemas/FeaturedInfo'
        metadata:
          $ref: '#/components/schemas/ProductMetadata'
        rating:
          $ref: '#/components/schemas/Rating'
        variant:
          type: string
          enum: [marijuana, edible, accessory]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Destination:
      type: object
      properties:
        name:
          type: string
        price:
          $ref: '#/components/schemas/Price'

    ShopFeatured:
      type: object
      properties:
        value:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    Shop:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        owner:
          type: string
          description: ObjectId reference to User
        contact:
          type: object
          properties:
            phone:
              type: string
            email:
              type: string
              format: email
        description:
          type: string
        status:
          type: string
          enum: [pending, suspended, frozen, deleted, active]
        image:
          type: string
        rank:
          type: integer
        featured:
          $ref: '#/components/schemas/ShopFeatured'
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/Destination'
        rating:
          $ref: '#/components/schemas/Rating'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        product:
          type: string
          description: ObjectId reference to Product
        quantity:
          type: integer
        status:
          type: string

    Order:
      type: object
      properties:
        _id:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled, delivering]
        shop:
          type: string
          description: ObjectId reference to Shop
        user:
          type: string
          description: ObjectId reference to User
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        price:
          $ref: '#/components/schemas/Price'
        destination:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId reference to User
        product:
          type: string
          description: ObjectId reference to Product
        text:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        visible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShopReview:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId reference to User
        shop:
          type: string
          description: ObjectId reference to Shop
        text:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        visible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentParty:
      type: object
      properties:
        provider:
          type: string
          enum: [mtn, vodafone, airtelTigo]
        number:
          type: string

    Payment:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId reference to User
        price:
          $ref: '#/components/schemas/Price'
        method:
          type: string
          enum: [mobile money]
        status:
          type: string
          enum: [pending, failed, success]
        sender:
          $ref: '#/components/schemas/PaymentParty'
        recipient:
          $ref: '#/components/schemas/PaymentParty'
        transactionID:
          type: string
        purpose:
          type: string
          enum: [product-promotion, store-promotion, daily-payment, monthly-payment, store-setup, product-setup]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Duration:
      type: object
      properties:
        amount:
          type: number
        unit:
          type: string
          enum: [day, month, year]

    Promotion:
      type: object
      properties:
        _id:
          type: string
        item:
          type: object
          properties:
            shop:
              type: string
              description: ObjectId reference to Shop
            product:
              type: string
              description: ObjectId reference to Product
        user:
          type: string
          description: ObjectId reference to User
        variant:
          type: string
          enum: [shop, product]
        rank:
          type: integer
        price:
          $ref: '#/components/schemas/Price'
        startDate:
          type: string
          format: date-time
        duration:
          $ref: '#/components/schemas/Duration'
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, active, expired]
        payment:
          type: string
          description: ObjectId reference to Payment
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Testimonial:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId reference to User
        text:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        visible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FAQ:
      type: object
      properties:
        _id:
          type: string
        question:
          type: string
        answer:
          type: string
        category:
          type: string
        visible:
          type: boolean
        order:
          type: integer
        createdBy:
          type: string
          description: ObjectId reference to Admin
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageReply:
      type: object
      properties:
        text:
          type: string
        admin:
          type: string
          description: ObjectId reference to Admin
        repliedAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId reference to User
        subject:
          type: string
        text:
          type: string
        status:
          type: string
          enum: [pending, read, replied]
        reply:
          $ref: '#/components/schemas/MessageReply'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShopVisit:
      type: object
      properties:
        _id:
          type: string
        visitor:
          type: string
          description: ObjectId reference to User
        shop:
          type: string
          description: ObjectId reference to Shop
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuccessMessage:
      type: object
      properties:
        message:
          type: string

    PaginatedResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items: {}
        count:
          type: integer

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    TokenParam:
      name: token
      in: path
      required: true
      schema:
        type: string

paths:
  # ─────────────────────────────────────────────
  # User Auth
  # ─────────────────────────────────────────────
  /user/auth/register:
    post:
      tags: [User Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, phone, firstName, lastName, pin, email, role]
              properties:
                username:
                  type: string
                password:
                  type: string
                phone:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                pin:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [vendor, user]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/login:
    post:
      tags: [User Auth]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usernameOrEmailOrPhone, password]
              properties:
                usernameOrEmailOrPhone:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string

  /user/auth/otp/{token}/verify:
    post:
      tags: [User Auth]
      summary: Verify OTP
      parameters:
        - $ref: '#/components/parameters/TokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string

  /user/auth/otp/resend:
    post:
      tags: [User Auth]
      summary: Resend OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usernameOrEmailOrPhone]
              properties:
                usernameOrEmailOrPhone:
                  type: string
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string

  /user/auth/profile:
    get:
      tags: [User Auth]
      summary: Get user profile
      security:
        - UserAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
    put:
      tags: [User Auth]
      summary: Update user profile
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                username:
                  type: string
                phone:
                  type: string
                address:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
    delete:
      tags: [User Auth]
      summary: Delete user profile (mark as deleted)
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/profile/{token}:
    put:
      tags: [User Auth]
      summary: Verify profile update with OTP
      parameters:
        - $ref: '#/components/parameters/TokenParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
      responses:
        '200':
          description: Profile verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/profile/freeze:
    delete:
      tags: [User Auth]
      summary: Deactivate (freeze) user profile
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
      responses:
        '200':
          description: Profile frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/profile/activate:
    put:
      tags: [User Auth]
      summary: Reactivate user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin, email]
              properties:
                pin:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Profile reactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/passwords/change:
    put:
      tags: [User Auth]
      summary: Change password
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, password]
              properties:
                currentPassword:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/passwords/reset:
    put:
      tags: [User Auth]
      summary: Reset password
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/pins/change:
    put:
      tags: [User Auth]
      summary: Change pin
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPin, pin]
              properties:
                currentPin:
                  type: string
                pin:
                  type: string
      responses:
        '200':
          description: Pin changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/pins/reset:
    put:
      tags: [User Auth]
      summary: Reset pin
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
      responses:
        '200':
          description: Pin reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/logout:
    post:
      tags: [User Auth]
      summary: Logout current session
      security:
        - UserAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /user/auth/logoutAll:
    post:
      tags: [User Auth]
      summary: Logout all sessions
      security:
        - UserAuth: []
      responses:
        '200':
          description: All sessions logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  # ─────────────────────────────────────────────
  # User Products
  # ─────────────────────────────────────────────
  /user/products:
    post:
      tags: [User Products]
      summary: Create a product
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, shop, stock, price, description, image, details, variant]
              properties:
                name:
                  type: string
                shop:
                  type: string
                stock:
                  $ref: '#/components/schemas/Stock'
                price:
                  $ref: '#/components/schemas/Price'
                description:
                  type: string
                image:
                  type: string
                details:
                  type: object
                variant:
                  type: string
                  enum: [marijuana, edible, accessory]
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
    get:
      tags: [User Products]
      summary: List products
      security:
        - UserAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: owner
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Products retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  count:
                    type: integer

  /user/products/{id}:
    get:
      tags: [User Products]
      summary: Get a product by ID
      security:
        - UserAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Product retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Product'
    put:
      tags: [User Products]
      summary: Update a product
      security:
        - UserAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                contact:
                  type: object
                description:
                  type: string
                image:
                  type: string
                stock:
                  $ref: '#/components/schemas/Stock'
                price:
                  $ref: '#/components/schemas/Price'
                metadata:
                  type: object
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
    delete:
      tags: [User Products]
      summary: Delete a product
      security:
        - UserAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  # ─────────────────────────────────────────────
  # User Shops
  # ─────────────────────────────────────────────
  /user/shops:
    post:
      tags: [User Shops]
      summary: Create a shop
      security:
        - UserAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, contact, description, image, destinations]
              properties:
                name:
                  type: string
                contact:
                  type: object
                  properties:
                    phone:
                      type: string
                    email:
                      type: string
                      format: email
                description:
                  type: string
                image:
                  type: string
                destinations:
                  type: array
                  items:
                    $ref: '#/components/schemas/Destination'
      responses:
        '201':
          description: Shop created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
    get:
      tags: [User Shops]
      summary: List shops
      security:
        - UserAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: owner
          in: query
          schema:
            type: string
        - name: status
